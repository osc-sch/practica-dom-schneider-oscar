<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Superhéroes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="asset/css/style.css">
</head>

<body>
    <header>
        <!-- barra de navegacion -->
        <nav class="navbar navbar-expand-xl navbar-dark bg-dark" aria-label="Sixth navbar example">
            <div class="container-fluid"> <a class="navbar-brand" href="#">Galería de Superhéroes</a> <button
                    class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample06"
                    aria-controls="navbarsExample06" aria-expanded="false" aria-label="Toggle navigation"> <span
                        class="navbar-toggler-icon"></span> </button>
                <div class="collapse navbar-collapse" id="navbarsExample06">
                    <ul class="navbar-nav me-auto mb-2 mb-xl-0">
                        <li class="nav-item"><button type="button" class="btn btn-success" data-bs-toggle="modal"
                                data-bs-target="#exampleModal" data-bs-whatever="@mdo" id="myModal">Añadir
                                Superhéroes</button></li>
                    </ul>
                    <form role="search" method="post" class="d-flex gap-2">
                        <input class="form-control" type="search" placeholder="Buscar Heroe" aria-label="Search"
                            id="buscar">
                    </form>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- seccion donde estaran las cartas -->
        <section>
            <div class="cont-heroe container">
                <div class="row" id="contenedorHeroe">
                    <!-- aqui iran las cartas -->
                </div>
            </div>
        </section>
        <!-- seccion para el formulario de carga -->
        <section>
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Nuevo Superhéroes</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form method="post" id="addHeroe">
                                <div class="mb-3">
                                    <label for="recipient-name" class="col-form-label">Nombre:</label>
                                    <input type="text" class="form-control" id="name-heroe">
                                </div>
                                <div class="mb-3">
                                    <label for="message-text" class="col-form-label">Imagen(URL):</label>
                                    <input type="text" class="form-control" id="image-heroe">
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="button" class="btn btn-primary" id="agregar" data-bs-dismiss="modal">Añadir
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <button type="button" class="btn btn-success position-fixed bottom-0 end-0 m-4 rounded-circle shadow"
            data-bs-toggle="modal" data-bs-target="#exampleModal" data-bs-whatever="@mdo"
            style="width: 60px; height: 60px; z-index: 1050;" id="buttom-add"><i
                class="bi bi-person-plus-fill"></i></button>
    </main>
    <footer>

    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="asset/js/app.js"></script>

</html>
